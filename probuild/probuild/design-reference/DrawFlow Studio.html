<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DrawFlow Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117;
  --surface: #161b27;
  --surface-2: #1e2433;
  --surface-3: #252d3e;
  --border: #2a3347;
  --border-light: #1f2840;
  --text: #cdd9f0;
  --text-dim: #6b7a99;
  --text-muted: #404d68;
  --accent: #3b82f6;
  --accent-dim: rgba(59,130,246,0.15);
  --accent-glow: rgba(59,130,246,0.25);
  --green: #22c55e;
  --red: #ef4444;
  --amber: #f59e0b;
  --canvas-bg: #e8ecf4;
  --paper: #ffffff;
  --radius: 6px;
  --radius-lg: 10px;
  font-family: 'DM Sans', system-ui, sans-serif;
  font-size: 13px;
  color: var(--text);
  background: var(--bg);
}
html, body, #root { height: 100%; overflow: hidden; }

/* scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: var(--surface-3); }

/* ── Layout shells ── */
.app { display: flex; flex-direction: column; height: 100vh; background: var(--bg); }
.app-body { display: flex; flex: 1; overflow: hidden; }

/* ── Toolbar ── */
.toolbar {
  height: 48px; display: flex; align-items: center; gap: 0;
  background: var(--surface); border-bottom: 1px solid var(--border-light);
  padding: 0 12px; flex-shrink: 0; position: relative; z-index: 100;
}
.toolbar-brand { display: flex; align-items: center; gap: 10px; padding-right: 14px; border-right: 1px solid var(--border); margin-right: 10px; }
.brand-mark {
  width: 28px; height: 28px; border-radius: 7px; background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff; letter-spacing: 0.05em;
  flex-shrink: 0;
}
.brand-name { font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; }
.project-name-input {
  background: transparent; border: none; outline: none;
  font: inherit; font-size: 12px; color: var(--text-dim); 
  max-width: 200px; cursor: text;
  padding: 2px 6px; border-radius: var(--radius);
  transition: background 0.15s, color 0.15s;
}
.project-name-input:hover { background: var(--surface-2); color: var(--text); }
.project-name-input:focus { background: var(--surface-3); color: var(--text); }

.tb-divider { width: 1px; height: 24px; background: var(--border); margin: 0 8px; flex-shrink: 0; }
.tb-group { display: flex; align-items: center; gap: 2px; }
.tb-label { font-size: 10px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; padding: 0 6px; }

.tb-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 5px;
  height: 30px; padding: 0 9px; border-radius: var(--radius);
  border: none; background: transparent; color: var(--text-dim);
  cursor: pointer; font: inherit; font-size: 12px; font-weight: 500;
  transition: background 0.12s, color 0.12s;
  white-space: nowrap; flex-shrink: 0; position: relative;
}
.tb-btn:hover { background: var(--surface-3); color: var(--text); }
.tb-btn.active { background: var(--accent-dim); color: var(--accent); }
.tb-btn.primary { background: var(--accent); color: #fff; font-weight: 600; }
.tb-btn.primary:hover { background: #2563eb; color: #fff; }
.tb-btn.danger:hover { background: rgba(239,68,68,0.15); color: var(--red); }
.tb-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.tb-btn svg { flex-shrink: 0; }

.tb-kbd { 
  font-family: 'JetBrains Mono', monospace; font-size: 9px; 
  background: var(--surface-3); color: var(--text-muted); 
  border-radius: 3px; padding: 1px 4px; letter-spacing: 0; 
}

.tb-spacer { flex: 1; }

.tb-select {
  height: 28px; background: var(--surface-2); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text); padding: 0 8px;
  font: inherit; font-size: 12px; outline: none; cursor: pointer;
}
.tb-select:focus { border-color: var(--accent); }
.tb-select option { background: var(--surface-2); }

/* ── Left sidebar ── */
.sidebar {
  width: 52px; background: var(--surface); border-right: 1px solid var(--border-light);
  display: flex; flex-direction: column; align-items: center; padding: 8px 0; gap: 2px;
  flex-shrink: 0; z-index: 50;
}
.sidebar-btn {
  width: 36px; height: 36px; border-radius: var(--radius-lg);
  display: flex; align-items: center; justify-content: center;
  background: transparent; border: none; color: var(--text-muted);
  cursor: pointer; transition: background 0.12s, color 0.12s; position: relative;
}
.sidebar-btn:hover { background: var(--surface-3); color: var(--text-dim); }
.sidebar-btn.active { background: var(--accent-dim); color: var(--accent); }
.sidebar-btn.active::before {
  content: ''; position: absolute; left: -8px; top: 50%; transform: translateY(-50%);
  width: 3px; height: 18px; background: var(--accent); border-radius: 0 3px 3px 0;
}
.sidebar-sep { width: 28px; height: 1px; background: var(--border); margin: 4px 0; }

/* ── Panel ── */
.panel {
  width: 0; overflow: hidden; background: var(--surface);
  border-right: 1px solid var(--border-light);
  display: flex; flex-direction: column;
  transition: width 0.2s cubic-bezier(0.4,0,0.2,1);
  flex-shrink: 0;
}
.panel.open { width: 300px; }
.panel-header { padding: 16px 16px 12px; border-bottom: 1px solid var(--border-light); flex-shrink: 0; }
.panel-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }
.panel-subtitle { font-size: 13px; font-weight: 600; color: var(--text); margin-top: 3px; }
.panel-body { flex: 1; overflow-y: auto; padding: 12px; }
.panel-section { margin-bottom: 16px; }
.panel-section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 8px; }

/* ── Form elements ── */
.field { margin-bottom: 10px; }
.field-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 5px; display: block; }
.field-input {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 7px 10px; color: var(--text);
  font: inherit; font-size: 12px; outline: none; transition: border-color 0.12s;
}
.field-input:focus { border-color: var(--accent); }
.field-input::placeholder { color: var(--text-muted); }
.field-select {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 7px 10px; color: var(--text);
  font: inherit; font-size: 12px; outline: none; cursor: pointer;
}
.field-select option { background: var(--surface); }
.field-textarea {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 7px 10px; color: var(--text);
  font-family: 'JetBrains Mono', monospace; font-size: 11px; outline: none;
  resize: vertical; min-height: 100px; transition: border-color 0.12s; line-height: 1.6;
}
.field-textarea:focus { border-color: var(--accent); }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  height: 30px; padding: 0 12px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--surface-2); color: var(--text-dim);
  cursor: pointer; font: inherit; font-size: 12px; font-weight: 500;
  transition: all 0.12s; white-space: nowrap;
}
.btn:hover { border-color: var(--border); background: var(--surface-3); color: var(--text); }
.btn-sm { height: 26px; padding: 0 9px; font-size: 11px; }
.btn-full { width: 100%; }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
.btn-primary:hover { background: #2563eb; border-color: #2563eb; color: #fff; }
.btn-danger { border-color: rgba(239,68,68,0.3); color: var(--red); }
.btn-danger:hover { background: rgba(239,68,68,0.1); border-color: var(--red); }
.btn:disabled { opacity: 0.3; cursor: not-allowed; }

.btn-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.btn-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }

/* ── Library cards ── */
.lib-card {
  background: var(--surface-2); border: 1px solid var(--border-light);
  border-radius: var(--radius-lg); padding: 12px; margin-bottom: 8px;
  cursor: pointer; transition: border-color 0.12s, background 0.12s;
}
.lib-card:hover { border-color: var(--accent); background: var(--surface-3); }
.lib-card-name { font-size: 12px; font-weight: 600; color: var(--text); }
.lib-card-meta { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
.lib-card-desc { font-size: 11px; color: var(--text-dim); margin-top: 6px; line-height: 1.5; }
.lib-card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.lib-tag { font-size: 10px; background: var(--surface-3); border-radius: 4px; padding: 2px 6px; color: var(--text-muted); }

/* ── Project cards ── */
.proj-card {
  background: var(--surface-2); border: 1px solid var(--border-light);
  border-radius: var(--radius-lg); padding: 12px; margin-bottom: 8px;
  transition: border-color 0.12s;
}
.proj-card.active { border-color: var(--accent); background: var(--accent-dim); }
.proj-card-name { font-size: 12px; font-weight: 600; color: var(--text); }
.proj-card-meta { font-size: 10px; color: var(--text-muted); margin-top: 3px; }

/* ── Canvas area ── */
.canvas-area {
  flex: 1; overflow: auto; position: relative;
  background-color: var(--canvas-bg);
  background-image:
    linear-gradient(rgba(100,116,139,0.12) 1px, transparent 1px),
    linear-gradient(90deg, rgba(100,116,139,0.12) 1px, transparent 1px);
  background-size: 24px 24px;
}
.canvas-inner { min-width: 100%; min-height: 100%; display: flex; align-items: center; justify-content: center; padding: 48px; }
.paper-sheet {
  background: var(--paper); position: relative; flex-shrink: 0;
  box-shadow: 0 4px 6px rgba(0,0,0,0.04), 0 12px 40px rgba(0,0,0,0.1), 0 0 0 1px rgba(0,0,0,0.06);
  border-radius: 2px;
}
.paper-content { width: 100%; height: 100%; position: relative; overflow: hidden; }

/* ── Sheet tabs ── */
.sheet-tabs {
  position: absolute; bottom: 0; left: 0; right: 0; height: 36px;
  background: var(--surface); border-top: 1px solid var(--border-light);
  display: flex; align-items: center; gap: 1px; padding: 0 12px; z-index: 20;
  overflow-x: auto;
}
.sheet-tab {
  height: 26px; padding: 0 12px; border-radius: 5px; display: flex; align-items: center;
  font-size: 11px; font-weight: 500; cursor: pointer;
  white-space: nowrap; border: none; background: transparent; color: var(--text-muted);
  transition: background 0.1s, color 0.1s; gap: 6px;
}
.sheet-tab:hover { background: var(--surface-3); color: var(--text-dim); }
.sheet-tab.active { background: var(--surface-3); color: var(--text); }
.sheet-tab-add { color: var(--accent); }
.sheet-tab-close { opacity: 0; width: 12px; height: 12px; border-radius: 3px; display: flex; align-items: center; justify-content: center; }
.sheet-tab:hover .sheet-tab-close { opacity: 0.5; }
.sheet-tab-close:hover { opacity: 1 !important; background: var(--red); }

/* ── Status bar ── */
.statusbar {
  height: 26px; background: var(--surface); border-top: 1px solid var(--border-light);
  display: flex; align-items: center; gap: 0; padding: 0 12px; flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted);
}
.sb-item { display: flex; align-items: center; gap: 5px; padding: 0 10px; border-right: 1px solid var(--border-light); height: 100%; }
.sb-item:first-child { padding-left: 0; }
.sb-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.sb-spacer { flex: 1; }
.sb-accent { color: var(--accent); }
.sb-green { color: var(--green); }

/* ── Notice / Toast ── */
.toast {
  position: fixed; bottom: 44px; left: 50%; transform: translateX(-50%);
  background: var(--surface-3); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 9px 16px; font-size: 12px; color: var(--text);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4); z-index: 9999;
  animation: toast-in 0.2s ease; white-space: nowrap;
}
@keyframes toast-in { from { opacity:0; transform: translateX(-50%) translateY(8px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }

/* ── Zoom badge ── */
.zoom-badge {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  min-width: 42px; text-align: center;
}

/* ── Tag chip ── */
.chip { display: inline-flex; align-items: center; height: 18px; padding: 0 7px; border-radius: 99px; font-size: 10px; font-weight: 600; letter-spacing: 0.04em; }
.chip-blue { background: var(--accent-dim); color: var(--accent); }
.chip-green { background: rgba(34,197,94,0.12); color: var(--green); }
.chip-amber { background: rgba(245,158,11,0.12); color: var(--amber); }

/* ── Color swatch ── */
.color-row { display: flex; align-items: center; gap: 8px; }
.color-swatch { width: 28px; height: 28px; border-radius: var(--radius); border: 1px solid var(--border); cursor: pointer; }

/* ── Auth screen ── */
.auth-overlay {
  position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 999;
}
.auth-card {
  width: 400px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 40px; position: relative;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.04) inset, 0 32px 80px rgba(0,0,0,0.4);
}
.auth-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
.auth-brand { width: 40px; height: 40px; border-radius: 10px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; }
.auth-title { font-size: 22px; font-weight: 700; color: var(--text); }
.auth-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
.auth-tabs { display: flex; gap: 0; background: var(--bg); border-radius: var(--radius); padding: 3px; margin-bottom: 24px; }
.auth-tab { flex: 1; height: 30px; border: none; background: transparent; border-radius: 5px; font: inherit; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--text-muted); transition: all 0.15s; }
.auth-tab.active { background: var(--surface-3); color: var(--text); }
.auth-notice { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; font-size: 11px; color: var(--text-dim); margin-bottom: 16px; }
.auth-notice.error { border-color: rgba(239,68,68,0.4); color: var(--red); background: rgba(239,68,68,0.08); }
.auth-notice.success { border-color: rgba(34,197,94,0.4); color: var(--green); background: rgba(34,197,94,0.08); }

/* ── Misc ── */
.empty-state { text-align: center; padding: 32px 16px; color: var(--text-muted); font-size: 12px; line-height: 1.7; }
.divider { height: 1px; background: var(--border-light); margin: 12px 0; }
.row { display: flex; align-items: center; gap: 8px; }
.row-between { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
</style>
</head>

/* ── Canvas Area ── */
function CanvasArea({ zoom, toolMode, pages, currentPage, setCurrentPage, onAddPage, onDeletePage }) {
  const paperW = Math.round(1120 * zoom);
  const paperH = Math.round(792 * zoom);
  const [showGrid, setShowGrid] = useState(true);

  return (
    <div className="canvas-area" style={showGrid ? {} : {backgroundImage:'none',backgroundColor:'#d8dde8'}}>
      <div className="canvas-inner" style={{paddingBottom:52}}>
        <div className="paper-sheet" style={{width:paperW, height:paperH}}>
          <div className="paper-content">
            {/* Simulated drawing elements */}
            <svg width="100%" height="100%" style={{position:'absolute',inset:0,opacity:0.6}}>
              <rect x="40" y="40" width={paperW-80} height={paperH-80} fill="none" stroke="#94a3b8" strokeWidth="0.5" strokeDasharray="4,4"/>
              {/* Column grid lines */}
              {[0.2,0.4,0.6,0.8].map((f,i)=>(
                <line key={`v${i}`} x1={paperW*f} y1="40" x2={paperW*f} y2={paperH-80} stroke="#cbd5e1" strokeWidth="0.4" strokeDasharray="2,6"/>
              ))}
              {[0.25,0.5,0.75].map((f,i)=>(
                <line key={`h${i}`} x1="40" y1={paperH*f} x2={paperW-40} y2={paperH*f} stroke="#cbd5e1" strokeWidth="0.4" strokeDasharray="2,6"/>
              ))}
              {/* Title block */}
              <rect x={paperW-290} y={paperH-90} width={250} height={70} fill="white" stroke="#64748b" strokeWidth="0.8"/>
              <line x1={paperW-290} y1={paperH-65} x2={paperW-40} y2={paperH-65} stroke="#64748b" strokeWidth="0.5"/>
              <line x1={paperW-180} y1={paperH-90} x2={paperW-180} y2={paperH-40} stroke="#64748b" strokeWidth="0.5"/>
              <text x={paperW-280} y={paperH-75} fontSize={Math.max(7,zoom*10)} fill="#334155" fontFamily="DM Sans">Foundation Plan — Block A</text>
              <text x={paperW-280} y={paperH-52} fontSize={Math.max(6,zoom*8)} fill="#64748b" fontFamily="DM Sans">Project Title</text>
              <text x={paperW-170} y={paperH-75} fontSize={Math.max(6,zoom*8)} fill="#64748b" fontFamily="DM Sans">Sheet 1 of {pages.length}</text>
              <text x={paperW-170} y={paperH-52} fontSize={Math.max(6,zoom*8)} fill="#64748b" fontFamily="DM Sans">Rev A · {new Date().toLocaleDateString()}</text>
            </svg>
          </div>
        </div>
      </div>
      {/* Sheet tabs */}
      <div className="sheet-tabs">
        {pages.map((p,i)=>(
          <button key={p.id} className={`sheet-tab ${currentPage===i?'active':''}`} onClick={()=>setCurrentPage(i)}>
            <span>{i+1}. {p.name}</span>
            {pages.length > 1 && <span className="sheet-tab-close" onClick={e=>{e.stopPropagation();onDeletePage(i);}}>
              <svg width="8" height="8" viewBox="0 0 8 8"><path d="M1 1l6 6M7 1L1 7" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>
            </span>}
          </button>
        ))}
        <button className="sheet-tab sheet-tab-add" onClick={onAddPage}>{icons.plus} Add sheet</button>
        <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:6}}>
          <button className="sheet-tab" onClick={()=>setShowGrid(!showGrid)} style={{color:showGrid?'var(--accent)':'var(--text-muted)'}}>
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1 4h8M1 7h8M4 1v8M7 1v8" stroke="currentColor" strokeWidth="1"/></svg>
            Grid
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── Auth Screen ── */
function AuthScreen({ onLogin }) {
  const [tab, setTab] = useState('signin');
  const [notice, setNotice] = useState(null);
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [name, setName] = useState('');
  const [company, setCompany] = useState('');

  const handleSubmit = e => {
    e.preventDefault();
    if (!email || !password) { setNotice({type:'error',msg:'Please fill in all required fields.'}); return; }
    setNotice({type:'success',msg:'Signing in…'});
    setTimeout(() => onLogin({ name: name || email.split('@')[0], company, email, role: email.includes('admin') ? 'admin' : 'engineer' }), 800);
  };

  return (
    <div className="auth-overlay">
      <div className="auth-card">
        <div className="auth-logo">
          <div className="auth-brand">DF</div>
          <div>
            <div className="auth-title">DrawFlow Studio</div>
            <div className="auth-sub">Engineering drawing platform</div>
          </div>
        </div>
        <div className="auth-tabs">
          <button className={`auth-tab ${tab==='signin'?'active':''}`} onClick={()=>setTab('signin')}>Sign in</button>
          <button className={`auth-tab ${tab==='signup'?'active':''}`} onClick={()=>setTab('signup')}>Create account</button>
        </div>
        {notice && <div className={`auth-notice ${notice.type}`}>{notice.msg}</div>}
        <form onSubmit={handleSubmit}>
          {tab === 'signup' && <>
            <div className="field"><label className="field-label">Full name</label><input className="field-input" value={name} onChange={e=>setName(e.target.value)} placeholder="James Chen" /></div>
            <div className="field"><label className="field-label">Company</label><input className="field-input" value={company} onChange={e=>setCompany(e.target.value)} placeholder="Apex Engineering Ltd." /></div>
          </>}
          <div className="field"><label className="field-label">Email</label><input className="field-input" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@company.com" required /></div>
          <div className="field" style={{marginBottom:20}}><label className="field-label">Password</label><input className="field-input" type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" required /></div>
          <button type="submit" className="btn btn-primary btn-full" style={{height:40,fontSize:13}}>{tab==='signin'?'Sign in to workspace':'Create account'}</button>
        </form>
        <div style={{marginTop:20,fontSize:11,color:'var(--text-muted)',textAlign:'center',lineHeight:1.8}}>
          Backed by Supabase · Multi-sheet PDF export<br/>
          <span style={{color:'var(--accent)',cursor:'pointer'}} onClick={()=>onLogin({name:'Demo User',company:'Demo Corp',email:'demo@drawflow.io',role:'engineer'})}>Continue with demo account →</span>
        </div>
      </div>
    </div>
  );
}

/* ── Status Bar ── */
function StatusBar({ toolMode, zoom, selectedCount, statusMessage, pages, currentPage, lastSaved }) {
  const toolHints = {
    select: 'Click to select · Shift+click to multi-select · Drag to move',
    pan: 'Drag to pan canvas · Scroll to zoom',
    line: 'Click to set start point · Click again to place · Shift to constrain angle',
    dimension: 'Click first point → second point → drag offset to place dimension',
    trim: 'Click near end of line to trim to nearest intersection',
  };
  return (
    <div className="statusbar">
      <div className="sb-item"><div className="sb-dot" /><span className="sb-green">Connected</span></div>
      <div className="sb-item"><span style={{color:'var(--text-dim)',fontSize:10}}>{toolHints[toolMode]}</span></div>
      <div className="sb-spacer" />
      {statusMessage && <div className="sb-item" style={{color:'var(--accent)'}}>{statusMessage}</div>}
      <div className="sb-item">{selectedCount > 0 ? <span className="sb-accent">{selectedCount} obj</span> : <span>No selection</span>}</div>
      <div className="sb-item">Sheet {currentPage+1}/{pages.length}</div>
      <div className="sb-item" style={{fontFamily:'JetBrains Mono'}}>{Math.round(zoom*100)}%</div>
      {lastSaved && <div className="sb-item">Saved {lastSaved}</div>}
    </div>
  );
}

/* ── Main App ── */
const TWEAK_DEFAULS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "accentColor": "#3b82f6",
  "density": "normal",
  "showGrid": true
}/*EDITMODE-END*/;

function App() {
  const tw = useTweaks(TWEAK_DEFAULS);
  const tweaks = tw?.tweaks ?? TWEAK_DEFAULS;
  const setTweak = tw?.setTweak ?? (() => {});
  const [authed, setAuthed] = useState(false);
  const [session, setSession] = useState(null);
  const [toolMode, setToolMode] = useState('select');
  const [zoom, setZoom] = useState(0.72);
  const [selectedCount, setSelectedCount] = useState(0);
  const [projectName, setProjectName] = useState('Foundation Plan — Block A');
  const [paperSize, setPaperSize] = useState('A1');
  const [orientation, setOrientation] = useState('landscape');
  const [activeTab, setActiveTab] = useState('library');
  const [toastMsg, setToastMsg] = useState(null);
  const [lastSaved, setLastSaved] = useState(null);
  const [statusMessage, setStatusMessage] = useState(null);
  const [pages, setPages] = useState([
    {id:'s1',name:'Ground Floor Plan'},
    {id:'s2',name:'Site Plan'},
    {id:'s3',name:'Sections'},
  ]);
  const [currentPage, setCurrentPage] = useState(0);
  const [titleBlock, setTitleBlock] = useState({ projectTitle:'Foundation Plan',drawingTitle:'Ground Floor Plan',client:'City Infrastructure Dept.',drawingNo:'DWG-001',revision:'A',scale:'1:100',drawnBy:'J. Chen',checkedBy:'M. Park' });

  const toastRef = useRef(null);
  const toast = msg => {
    setToastMsg(msg);
    clearTimeout(toastRef.current);
    toastRef.current = setTimeout(()=>setToastMsg(null), 2600);
  };

  // Apply accent color
  useEffect(()=>{
    document.documentElement.style.setProperty('--accent', tweaks.accentColor);
  },[tweaks.accentColor]);

  const handleLogin = session => { setSession(session); setAuthed(true); };
  const handleLogout = () => { setAuthed(false); setSession(null); };
  const handleSave = () => { setLastSaved(new Date().toLocaleTimeString()); toast('Project saved.'); };
  const handleExport = () => toast('Exporting to PDF…');

  const sidebarTabs = [
    { id:'library', icon: icons.layers, label:'Library' },
    { id:'drafting', icon: icons.tool, label:'Drafting' },
    { id:'projects', icon: icons.folder, label:'Projects' },
    ...(session?.role==='admin' ? [{ id:'publish', icon: icons.publish, label:'Publish' }] : []),
  ];

  const handleSidebarTab = id => setActiveTab(prev => prev === id ? null : id);

  return (
    <div className="app">
      {!authed && <AuthScreen onLogin={handleLogin} />}
      {authed && session && <>
        <Toolbar
          toolMode={toolMode} setToolMode={setToolMode}
          zoom={zoom} onZoomIn={()=>setZoom(v=>Math.min(4,+(v+0.1).toFixed(2)))}
          onZoomOut={()=>setZoom(v=>Math.max(0.15,+(v-0.1).toFixed(2)))}
          onZoom100={()=>setZoom(1)} onZoomFit={()=>setZoom(0.72)}
          selectedCount={selectedCount}
          projectName={projectName} setProjectName={setProjectName}
          onSave={handleSave} onExport={handleExport}
          pages={pages} currentPage={currentPage} setCurrentPage={setCurrentPage}
          paperSize={paperSize} setPaperSize={setPaperSize}
          orientation={orientation} setOrientation={setOrientation}
          session={session} onLogout={handleLogout}
        />
        <div className="app-body">
          {/* Icon Rail */}
          <div className="sidebar">
            {sidebarTabs.map(t=>(
              <button key={t.id} className={`sidebar-btn ${activeTab===t.id?'active':''}`} title={t.label} onClick={()=>handleSidebarTab(t.id)}>
                {t.icon}
              </button>
            ))}
            <div className="sidebar-sep" />
            <button className="sidebar-btn" title="Toggle selection (click canvas items)" onClick={()=>setSelectedCount(c=>c===0?2:0)}>
              {icons.cursor}
            </button>
          </div>
          {/* Slide-out Panel */}
          <div className={`panel ${activeTab?'open':''}`}>
            <LeftPanel
              activeTab={activeTab} session={session}
              projectName={projectName}
              titleBlock={titleBlock} setTitleBlock={setTitleBlock}
              strokeColor={'#0f172a'} setStrokeColor={()=>{}}
              strokeWidth={1.2} setStrokeWidth={()=>{}}
              onApplyTitleBlock={()=>{}}
              selectedCount={selectedCount}
              statusMessage={null}
              toast={toast}
            />
          </div>
          {/* Canvas */}
          <CanvasArea
            zoom={zoom} toolMode={toolMode}
            pages={pages} currentPage={currentPage}
            setCurrentPage={setCurrentPage}
            onAddPage={()=>{
              const n = pages.length+1;
              setPages(p=>[...p,{id:`s${Date.now()}`,name:SHEET_NAMES[n-1]||`Sheet ${n}`}]);
              setCurrentPage(pages.length);
              toast('New sheet added.');
            }}
            onDeletePage={i=>{
              if(pages.length<=1) return;
              setPages(p=>p.filter((_,idx)=>idx!==i));
              if(currentPage>=i && currentPage>0) setCurrentPage(c=>c-1);
            }}
          />
        </div>
        <StatusBar toolMode={toolMode} zoom={zoom} selectedCount={selectedCount} statusMessage={statusMessage} pages={pages} currentPage={currentPage} lastSaved={lastSaved} />
        {toastMsg && <div className="toast">{toastMsg}</div>}
        <TweaksPanel tweaks={tweaks} setTweak={setTweak}>
          <TweakSection title="Appearance">
            <TweakColor id="accentColor" label="Accent color" />
            <TweakRadio id="density" label="Density" options={['compact','normal','relaxed']} />
          </TweakSection>
          <TweakSection title="Canvas">
            <TweakToggle id="showGrid" label="Show grid" />
          </TweakSection>
          <TweakSection title="Demo">
            <TweakButton label="Simulate selection" onClick={()=>setSelectedCount(c=>c===0?3:0)} />
            <TweakButton label="Show toast" onClick={()=>toast('Status message from DrawFlow.')} />
          </TweakSection>
        </TweaksPanel>
      </>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
